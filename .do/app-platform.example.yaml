# Exemplo de App Spec para DigitalOcean App Platform + Managed PostgreSQL.
# Antes de aplicar:
# 1. troca owner/repo, branch e dominio;
# 2. cria o cluster PostgreSQL gerido;
# 3. cria um pool chamado `catalog-pool`;
# 4. ajusta emails, branding e segredos.

name: kastrozap-prod
region: fra

alerts:
  - rule: DEPLOYMENT_FAILED

services:
  - name: web
    environment_slug: node-js
    github:
      repo: teu-user/teu-repo
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: npm install && npm run build
    run_command: npm start
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    health_check:
      initial_delay_seconds: 20
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
      http_path: /health
      port: 8080
    liveness_health_check:
      initial_delay_seconds: 30
      period_seconds: 15
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
      http_path: /health
      port: 8080
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_TIME
        type: GENERAL

jobs:
  - name: notifications-dispatch
    kind: SCHEDULED
    environment_slug: node-js
    github:
      repo: teu-user/teu-repo
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: npm install
    run_command: npm run notifications:dispatch
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    schedule:
      cron: "* * * * *"
      time_zone: Africa/Lagos
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_TIME
        type: GENERAL

databases:
  - name: catalog-db
    engine: PG
    version: "17"
    production: true
    cluster_name: teu-cluster-postgres
    db_name: catalogo_prod
    db_user: catalogo_app

envs:
