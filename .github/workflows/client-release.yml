name: Client Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  web-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run automated tests
        run: npm run test

      - name: Build web client
        run: npm run build

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist

  android-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: web-quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web client
        run: npm run build

      - name: Sync Capacitor Android project
        run: npm run native:sync

      - name: Upload Android sync artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-project-synced
          path: android
